; ============================================================
;  ACHAS PRE-PRODUCTION (Portal Provisioning) -- PlatformIO
; ============================================================
;
;  WHAT THIS IS
;  ------------
;  The SAME firmware as "UNIFIED", plus two pre-production extras:
;    * a power-on hardware self-test (LED codes for the manufacturer)
;    * an app-free web-portal provisioning path (core/portal_provision)
;
;  ONE binary runs every board; role (gateway/sensor) is chosen at RUNTIME
;  from what the portal writes to NVS. So it is truly "flash 1 .bin to all".
;
;  BUILD / FLASH (single environment):
;     pio run -e preprod
;     pio run -e preprod -t upload
;
;  HARDWARE : ESP32-C3 (WiFi + BLE). Link between boxes = ESP-NOW.
;  Web portal uses the built-in WebServer + DNSServer (no extra libs).


[common]
platform      = espressif32
board         = esp32-c3-devkitm-1
framework     = arduino
monitor_speed = 115200

; Big firmware (BLE + WiFi + TLS + MQTT + OTA). OTA needs TWO app slots to
; flip between; min_spiffs.csv gives two ~1.9 MB slots on a 4 MB flash.
board_build.partitions = min_spiffs.csv

; 40 MHz DIO flash: the 80 MHz default boot-loops many generic C3 clones.
board_build.f_flash    = 40000000L
board_build.flash_mode = dio

lib_deps =
    adafruit/Adafruit SHT4x Library @ ^1.0.4   ; temperature + humidity
    knolleary/PubSubClient @ ^2.8              ; MQTT client for EMQX
    bblanchon/ArduinoJson @ ^7.0.0            ; JSON (payload + Fleet API)
    ; WebServer + DNSServer (captive portal) are built into the ESP32 core.

build_flags =
    -DCONFIG_ARDUINO_LOOP_STACK_SIZE=16384   ; BLE + TLS need loop() stack
    -DARDUINO_USB_MODE=1                      ; log over the native USB-CDC
    -DARDUINO_USB_CDC_ON_BOOT=1


; ------------------------------------------------------------
;  The one environment. Flash this single .bin to every board.
; ------------------------------------------------------------
[env:preprod]
extends = common
build_flags =
    ${common.build_flags}
    -DCORE_DEBUG_LEVEL=3


; =========================================gw yg ===================
;  PRODUCTION HARDENING (flash encryption + secure boot)
; ============================================================
;  Enable per-unit ONLY for the real production run, after testing. These
;  are ONE-WAY eFuse operations (a mistake bricks the unit), so they stay
;  off here. See the UNIFIED project's platformio.ini + backend guides for
;  the sdkconfig.prod recipe.
